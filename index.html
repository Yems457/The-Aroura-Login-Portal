<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aurora Login Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://www.google.com/earth/studio/" rel="stylesheet">
</head>
<body>

   <div class="mesh-gradient">
   <div class="blob color-1"></div>
   <div class="blob color-2"></div>
   </div>
 

    <main class="glass-card">
        <h1>Welcome Back</h1>
        <p>Welcome to my newly created web page.</p>

         <div class="glass-div">
    <h2>Glass effect</h2>
    <p>The glass effect is real!</p>
  </div>
</div>
       

  <div class="container">
  <!-- Decorative Circles -->
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>

         <!-- Main Card -->
  <div class="card">
    <h2>Card Content</h2>
    <p>The circles are floating behind me!</p>
  </div>
</div>



        <form>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <button type="submit">Enter Portal</button>
            <button class="magnetic-button">Hover Me</button>
        </form>
    </main>

</body>
</html>
